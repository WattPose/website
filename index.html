<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>WattPose – AI Bike Position Coach for Indoor Cycling</title>
    <meta name="description" content="WattPose turns your iPhone camera into a real-time AI cycling coach. Analyse posture, track Virtual CdA, detect form collapse and export Strava highlights — 100% on-device, no wearables needed." />
    <meta name="keywords" content="cycling app, bike position, AI cycling coach, virtual CdA, indoor cycling, pose detection, smart trainer, bike fit app, iOS cycling" />
    <meta name="author" content="WattPose" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://wattpose.github.io/website/" />

    <!-- Hreflang for EN/DE -->
    <link rel="alternate" hreflang="en" href="https://wattpose.github.io/website/" />
    <link rel="alternate" hreflang="de" href="https://wattpose.github.io/website/" />
    <link rel="alternate" hreflang="x-default" href="https://wattpose.github.io/website/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="WattPose" />
    <meta property="og:url"         content="https://wattpose.github.io/website/" />
    <meta property="og:title"       content="WattPose – AI Bike Position Coach for Indoor Cycling" />
    <meta property="og:description" content="Real-time AI posture analysis, Virtual CdA tracking and collapse-point detection — all on your iPhone. No wearables. No subscription." />
    <meta property="og:image"       content="https://wattpose.github.io/website/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"       content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="WattPose – AI Bike Position Coach for Indoor Cycling" />
    <meta name="twitter:description" content="Real-time AI posture analysis, Virtual CdA tracking and collapse-point detection. Free for iOS." />
    <meta name="twitter:image"       content="https://wattpose.github.io/website/og-image.jpg" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/website/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/website/app-logo.jpeg" />
    <meta name="theme-color" content="#0B0F19" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MobileApplication",
      "name": "WattPose",
      "description": "AI-powered bike position coach for indoor cycling. Real-time posture analysis, Virtual CdA tracking and collapse-point detection — 100% on-device.",
      "url": "https://wattpose.github.io/website/",
      "applicationCategory": "SportsApplication",
      "operatingSystem": "iOS 16+",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1"
      },
      "featureList": [
        "Real-time AI posture analysis at 15 FPS",
        "Virtual CdA tracking",
        "Smart trainer ANT+/BLE integration",
        "Collapse point detection",
        "Strava highlight video export",
        "Session history and trends"
      ],
      "screenshot": [
        "https://wattpose.github.io/website/screenshots/en/screen1.jpg",
        "https://wattpose.github.io/website/screenshots/en/screen2.jpg",
        "https://wattpose.github.io/website/screenshots/en/screen3.jpg"
      ],
      "publisher": {
        "@type": "Organization",
        "name": "WattPose",
        "url": "https://wattpose.github.io/website/"
      }
    }
    </script>

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      /* Prevent flash of unstyled content */
      html { background: #0B0F19; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
